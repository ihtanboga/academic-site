bio: |
  Prof. Dr. Ibrahim Halil Tanboga is a Professor of Cardiology and Biostatistics
  at Nisantasi University Faculty of Medicine and President of the Digital Cardiology
  Society. With 318 publications and a Google Scholar h-index of 43, his research
  spans interventional cardiology, cardiovascular imaging, clinical trials, and
  AI-based digital health applications.
